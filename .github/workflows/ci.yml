name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: No network crate in the graph (switcher, not rotator)
        run: |
          if cargo tree -e normal | grep -qiE '\b(reqwest|hyper|ureq|isahc|curl)\b'; then
            echo "A network crate is in the dependency graph; swapdex must have none."
            exit 1
          fi
