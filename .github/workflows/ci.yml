name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # macOS included: 0.17-0.24 were almost entirely macOS Keychain behavior,
    # yet tests only ever ran on Linux. Keychain operations are disabled in
    # test builds (cfg!(test) gate) and under SWAPDEX_ROOT (integration tests
    # spawn the binary with it), so runners and contributor Macs stay clean.
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: No network crate in the graph (switcher, not rotator)
        run: |
          if cargo tree -e normal | grep -qiE '\b(reqwest|hyper|ureq|isahc|curl|tokio|rustls|native-tls|openssl|socket2|hickory-resolver|trust-dns|quinn|h2)\b'; then
            echo "A network crate is in the dependency graph; swapdex must have none."
            exit 1
          fi
      - name: Cargo audit
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-audit --locked
          cargo audit
