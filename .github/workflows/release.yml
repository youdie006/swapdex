name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "swapdex ${{ github.ref_name }}" \
            --notes "Prebuilt binaries for Linux, macOS, and Windows. Install with \`cargo install swapdex\`, \`brew install youdie006/tap/swapdex\`, or \`npm i -g @youdie006/swapdex\`." \
            || true

  build:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: swapdex
          target: ${{ matrix.target }}
          archive: swapdex-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
