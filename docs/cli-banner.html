<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0e0e12; --term: #1b1a20; --bar: #26242c;
    --cream: #e9e8ee; --muted: #8b8a95; --violet: #9d6bff; --gray: #cfced6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); }
  .wrap {
    width: 1200px; height: 760px; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  .term {
    width: 1030px; background: var(--term); border-radius: 15px; overflow: hidden;
    box-shadow: 0 30px 70px rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.05);
  }
  .bar { height: 48px; display: flex; align-items: center; gap: 9px; padding: 0 20px;
    background: var(--bar); }
  .bar i { width: 13px; height: 13px; border-radius: 50%; display: inline-block; }
  .bar .r { background: #e05a52; } .bar .y { background: #e0b23a; } .bar .g { background: #3ab85f; }
  .bar span { color: var(--muted); font-size: 15px; margin-left: 12px; }
  .body { padding: 52px 56px 48px; }
  .wordmark { font-size: 96px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .wordmark .a { color: var(--violet); } .wordmark .b { color: var(--gray); }
  .tag { margin-top: 22px; font-size: 22px; color: var(--muted); letter-spacing: -0.01em; }
  .cmds { margin-top: 40px; font-size: 21px; line-height: 1.95; }
  .cmds .p { color: var(--violet); font-weight: 700; margin-right: 12px; }
  .cmds .c { color: var(--cream); }
  .cmds .o { color: var(--muted); }
  .cmds .o .hl { color: var(--gray); }
  .cmds .o .star { color: var(--violet); }
</style>
</head>
<body>
<div class="wrap">
  <div class="term">
    <div class="bar"><i class="r"></i><i class="y"></i><i class="g"></i><span>swapdex</span></div>
    <div class="body">
      <div class="wordmark"><span class="a">swap</span><span class="b">dex</span></div>
      <div class="tag">Switch Claude Code and Codex login accounts &#8212; locally, one command.</div>
      <div class="cmds">
        <div><span class="c"><span class="p">$</span>swapdex add work</span></div>
        <div class="o">saved profile '<span class="hl">work</span>' (claude-code, codex)</div>
        <div><span class="c"><span class="p">$</span>swapdex use personal</span></div>
        <div class="o">switched codex &#8594; <span class="hl">you@personal.com</span></div>
        <div><span class="c"><span class="p">$</span>swapdex ls</span></div>
        <div class="o"><span class="star">*</span> work&nbsp;&nbsp;&nbsp;&nbsp;<span class="hl">you@work.com</span> [max]&nbsp;&nbsp;&nbsp;claude-code, codex</div>
      </div>
    </div>
  </div>
</div>
<script>
  if (new URLSearchParams(location.search).has("2x")) document.body.style.zoom = "2";
</script>
</body>
</html>
